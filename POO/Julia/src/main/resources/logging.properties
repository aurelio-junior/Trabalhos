# TUS-2390 - configuracao do java.util.logging
# Cada linha de log traz: data/hora, nivel, classe (logger) e a mensagem.

handlers = java.util.logging.ConsoleHandler
.level = INFO

java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# %1=timestamp  %4=nivel  %3=logger(classe)  %5=mensagem
java.util.logging.SimpleFormatter.format = %1$tF %1$tT %4$s %3$s - %5$s%n
